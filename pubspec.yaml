name: islamic_pdf_app
description: A new Flutter project.

publish_to: "none"

version: 1.2.0+12
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_pdfview: ^1.3.2

  path_provider: ^2.1.5

  url_launcher: ^6.3.2

  shared_preferences: ^2.5.3

  cloud_firestore: ^5.6.12

  firebase_messaging: ^15.2.10

  firebase_core: ^3.15.2

  firebase_auth: ^5.6.3

  permission_handler: ^11.4.0

  intl: ^0.20.2

  package_info_plus: ^8.3.0

  http: ^1.5.0

  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/pdfs/
    - assets/icons/
